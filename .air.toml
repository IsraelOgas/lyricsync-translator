root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/lyricsync ."
  bin = "./tmp/lyricsync"
  include_ext = ["go", "yaml", "yml"]
  exclude_dir = ["tmp", "web", "node_modules", ".git", ".engram", ".atl"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
